name: CI Smoke Checks

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JS syntax checks
        run: |
          node --check app.js
          node --check diary.js
          node --check deerschool.js
          node --check questions.js
          node --check sw.js

      - name: Basic file presence checks
        run: |
          test -f index.html
          test -f diary.html
          test -f manifest.json
